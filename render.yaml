services:
  - type: web
    name: studioflow-api
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: PRISMA_CLI_QUERY_ENGINE_TYPE=library npm install --omit=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        sync: false
